<div class="card-premium p-7">
    <p class="text-[10px] font-black text-slate-400 uppercase tracking-executive mb-8">Growth Highlights</p>

    <div class="space-y-5">
        <!-- Fastest Growth -->
        <div class="flex items-center group">
            <div
                class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 border border-emerald-100 group-hover:scale-110 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <div class="ml-4 flex-1">
                <div class="flex justify-between items-center mb-0.5">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Fastest Growing Country</p>
                    <span class="text-[11px] font-black text-emerald-600 tabular-nums">+{{ momentum.fastest_growth_rate
                        }}%</span>
                </div>
                <p class="text-[13px] font-black text-slate-900 leading-tight uppercase tracking-tight">{{
                    momentum.fastest_growth_country }}</p>
            </div>
        </div>

        <div class="h-px bg-slate-50 ml-14"></div>

        <!-- Most Resilient -->
        <div class="flex items-center group">
            <div
                class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 border border-blue-100 group-hover:scale-110 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <div class="ml-4 flex-1">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider mb-0.5">Most Reliable Network</p>
                <p class="text-[13px] font-black text-slate-900 leading-tight tracking-tight">{{
                    momentum.most_resilient_asn }}</p>
            </div>
        </div>

        <div class="h-px bg-slate-50 ml-14"></div>

        <!-- At Risk -->
        <div class="flex items-center group">
            <div
                class="w-10 h-10 rounded-xl bg-rose-50 flex items-center justify-center text-rose-600 border border-rose-100 group-hover:scale-110 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div class="ml-4 flex-1">
                <div class="flex justify-between items-center mb-0.5">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Needs Attention</p>
                    <span
                        class="text-[9px] font-black text-rose-500 uppercase tracking-tighter bg-rose-50 px-1.5 py-0.5 rounded">Vulnerable</span>
                </div>
                <p class="text-[13px] font-black text-slate-900 leading-tight uppercase tracking-tight">{{
                    momentum.at_risk_country }}</p>
            </div>
        </div>
    </div>
</div>
