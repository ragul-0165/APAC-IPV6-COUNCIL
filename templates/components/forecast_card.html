<div class="card-premium p-7">
    <p class="text-[10px] font-black text-slate-400 uppercase tracking-executive mb-8">Future Outlook</p>

    <div class="space-y-6">
        <!-- Pace -->
        <div class="group">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest leading-none mb-2">IPv6 Adoption
                Growth Rate</p>
            <div class="flex flex-col">
                <p class="text-4xl font-black text-white tracking-tight tabular-nums">+{{ forecast.current_pace }}%
                </p>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Estimated increase per
                    year</p>
            </div>
        </div>

        <!-- Milestones -->
        <div class="grid grid-cols-1 gap-2.5">
            <div
                class="bg-white/5 p-3 rounded-xl border border-white/5 flex justify-between items-center group/item hover:bg-white/10 transition-all">
                <span
                    class="text-[9px] font-black text-slate-500 uppercase tracking-wider group-hover/item:text-blue-400">80%
                    Target Year</span>
                <span class="text-sm font-black text-white tabular-nums">{{ forecast.target_80_date }}</span>
            </div>
            <div
                class="bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20 flex justify-between items-center group/item hover:bg-indigo-500/20 transition-all">
                <span
                    class="text-[9px] font-black text-indigo-400 uppercase tracking-wider group-hover/item:text-indigo-300">95%
                    Adoption Year</span>
                <span class="text-sm font-black text-indigo-100 tabular-nums">{{ forecast.target_95_date }}</span>
            </div>
        </div>


    </div>
</div>
